name: Guardian — Determinism Gate

# Proves the SEADS bit-for-bit promise: GOLDEN-SK-Sphere-001 world_hash must be
# IDENTICAL across MSVC / Clang / GCC on x64 + AArch64, and equal to the sealed hash.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  python-gates:
    name: Python gates (reference + probes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install gmpy2 hypothesis pytest
      - name: Generated headers in sync
        run: |
          python tools/gen_coeffs.py --check
          python tools/gen_golden_params.py --check
          python tools/gen_detmath_vectors.py --check
          python tools/gen_envelope_tables.py --check
          python tools/gen_scenario_params.py --check
          python tools/gen_geo001_vectors.py --check
          python tools/gen_snapshot_vectors.py --check
          python tools/gen_weapon_vectors.py --check
          python tools/gen_lockstep_vectors.py --check
          python tools/gen_interp_vectors.py --check
          python tools/gen_predict_vectors.py --check
          python tools/gen_session_vectors.py --check
          python tools/gen_event_vectors.py --check
          python tools/gen_framing_vectors.py --check
      - name: Rails + roster
        run: python tools/spec_monotone_check.py config/rails/atm.json
      - name: det_math oracle (vs MPFR)
        run: python tools/det_math_oracle.py --samples 8000
      - name: Tuning + flight probes
        run: python tools/tuning_probe.py data/tuning/envelopes/*.json
      - name: Ceiling probe
        run: python tools/atm_top_probe.py --ceil 8000 --soft 100
      - name: GEO-001 wire codec reference self-test
        run: python tools/geo001_ref.py
      - name: GEO-001 snapshot framing reference self-test
        run: python tools/snapshot_ref.py
      - name: Loopback lockstep reference self-test
        run: python tools/lockstep_ref.py
      - name: Remote interpolation reference self-test
        run: python tools/interp_ref.py
      - name: Client-side prediction reference self-test
        run: python tools/predict_ref.py
      - name: Server<->client session loop reference self-test
        run: python tools/session_ref.py
      - name: Reliable event-channel reference self-test
        run: python tools/event_ref.py
      - name: Stream-framing (layer 7) reference self-test
        run: python tools/framing_ref.py
      - name: Property tests (metamorphic)
        run: python -m pytest tests/property -q
      - name: Reference golden matches seal
        run: |
          python tools/ref_kernel.py --out /tmp/ref.bin
          python tools/validate_snapshot.py \
            --golden tests/golden/GOLDEN-SK-Sphere-001/expected.world_hash \
            --candidate /tmp/ref.bin
      - name: Reference scenario goldens match seal
        run: |
          for ID in GOLDEN-SK-Turn-001 GOLDEN-SK-Climb-001 GOLDEN-SK-TurnClimb-001 GOLDEN-SK-Accel-001 GOLDEN-SK-Pitch-001 GOLDEN-SK-Stall-001 GOLDEN-SK-Gunfire-001 GOLDEN-SK-Hit-001 GOLDEN-SK-Winchester-001; do
            python tools/ref_kernel.py --scenario "config/scenarios/$ID.json" --out "/tmp/$ID.bin"
            python tools/validate_snapshot.py \
              --golden "tests/golden/$ID/expected.world_hash" --candidate "/tmp/$ID.bin"
          done

  build-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinned to windows-2022 so the "Visual Studio 17 2022" generator below resolves:
          # windows-latest is now windows-2025-vs2026 (VS 18), which has no VS17 instance.
          - { name: "MSVC x64",   os: windows-2022,     gen: "msvc" }
          - { name: "GCC x64",    os: ubuntu-latest,    gen: "unix", cc: gcc,   cxx: g++ }
          - { name: "Clang x64",  os: ubuntu-latest,    gen: "unix", cc: clang, cxx: clang++ }
          - { name: "GCC arm64",  os: ubuntu-24.04-arm, gen: "unix", cc: gcc,   cxx: g++ }
          - { name: "Clang arm64",os: macos-14,         gen: "unix", cc: clang, cxx: clang++ }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Configure + build (MSVC)
        if: matrix.gen == 'msvc'
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release

      - name: Configure + build (Unix)
        if: matrix.gen == 'unix'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Locate binaries
        id: bin
        shell: bash
        run: |
          if [ "${{ matrix.gen }}" = "msvc" ]; then
            echo "golden=build/Release/seads_golden.exe" >> "$GITHUB_OUTPUT"
            echo "scenario=build/Release/seads_scenario.exe" >> "$GITHUB_OUTPUT"
            echo "dtest=build/Release/seads_detmath_test.exe" >> "$GITHUB_OUTPUT"
            echo "gtest=build/Release/seads_geo001_test.exe" >> "$GITHUB_OUTPUT"
            echo "stest=build/Release/seads_snapshot_test.exe" >> "$GITHUB_OUTPUT"
            echo "wtest=build/Release/seads_weapon_test.exe" >> "$GITHUB_OUTPUT"
            echo "ltest=build/Release/seads_lockstep_test.exe" >> "$GITHUB_OUTPUT"
            echo "itest=build/Release/seads_interp_test.exe" >> "$GITHUB_OUTPUT"
            echo "ptest=build/Release/seads_predict_test.exe" >> "$GITHUB_OUTPUT"
            echo "sstest=build/Release/seads_session_test.exe" >> "$GITHUB_OUTPUT"
            echo "evtest=build/Release/seads_event_test.exe" >> "$GITHUB_OUTPUT"
            echo "cltest=build/Release/seads_client_test.exe" >> "$GITHUB_OUTPUT"
            echo "ftest=build/Release/seads_framing_test.exe" >> "$GITHUB_OUTPUT"
            echo "nsvr=build/Release/seads_netserver.exe" >> "$GITHUB_OUTPUT"
            echo "ncli=build/Release/seads_netclient.exe" >> "$GITHUB_OUTPUT"
            echo "nloop=build/Release/seads_netloop_test.exe" >> "$GITHUB_OUTPUT"
            echo "nmulti=build/Release/seads_multiclient_test.exe" >> "$GITHUB_OUTPUT"
            echo "ndyn=build/Release/seads_netdyn_test.exe" >> "$GITHUB_OUTPUT"
            echo "ncatch=build/Release/seads_netcatchup_test.exe" >> "$GITHUB_OUTPUT"
            echo "nasync=build/Release/seads_netasync_test.exe" >> "$GITHUB_OUTPUT"
          else
            echo "golden=build/seads_golden" >> "$GITHUB_OUTPUT"
            echo "scenario=build/seads_scenario" >> "$GITHUB_OUTPUT"
            echo "dtest=build/seads_detmath_test" >> "$GITHUB_OUTPUT"
            echo "gtest=build/seads_geo001_test" >> "$GITHUB_OUTPUT"
            echo "stest=build/seads_snapshot_test" >> "$GITHUB_OUTPUT"
            echo "wtest=build/seads_weapon_test" >> "$GITHUB_OUTPUT"
            echo "ltest=build/seads_lockstep_test" >> "$GITHUB_OUTPUT"
            echo "itest=build/seads_interp_test" >> "$GITHUB_OUTPUT"
            echo "ptest=build/seads_predict_test" >> "$GITHUB_OUTPUT"
            echo "sstest=build/seads_session_test" >> "$GITHUB_OUTPUT"
            echo "evtest=build/seads_event_test" >> "$GITHUB_OUTPUT"
            echo "cltest=build/seads_client_test" >> "$GITHUB_OUTPUT"
            echo "ftest=build/seads_framing_test" >> "$GITHUB_OUTPUT"
            echo "nsvr=build/seads_netserver" >> "$GITHUB_OUTPUT"
            echo "ncli=build/seads_netclient" >> "$GITHUB_OUTPUT"
            echo "nloop=build/seads_netloop_test" >> "$GITHUB_OUTPUT"
            echo "nmulti=build/seads_multiclient_test" >> "$GITHUB_OUTPUT"
            echo "ndyn=build/seads_netdyn_test" >> "$GITHUB_OUTPUT"
            echo "ncatch=build/seads_netcatchup_test" >> "$GITHUB_OUTPUT"
            echo "nasync=build/seads_netasync_test" >> "$GITHUB_OUTPUT"
          fi

      - name: det_math bit-exact test
        shell: bash
        run: "${{ steps.bin.outputs.dtest }}"

      - name: GEO-001 codec byte-exact test
        shell: bash
        run: "${{ steps.bin.outputs.gtest }}"

      - name: GEO-001 snapshot byte-exact test
        shell: bash
        run: "${{ steps.bin.outputs.stest }}"

      - name: WEAPON-001 gunnery-section byte-exact test
        shell: bash
        run: "${{ steps.bin.outputs.wtest }}"

      - name: Loopback lockstep parity test
        shell: bash
        run: "${{ steps.bin.outputs.ltest }}"

      - name: Remote interpolation parity test
        shell: bash
        run: "${{ steps.bin.outputs.itest }}"

      - name: Client-side prediction parity test
        shell: bash
        run: "${{ steps.bin.outputs.ptest }}"

      - name: Server<->client session reconstruction parity test
        shell: bash
        run: "${{ steps.bin.outputs.sstest }}"

      - name: Reliable event-channel parity test (journal + blackout bound)
        shell: bash
        run: "${{ steps.bin.outputs.evtest }}"

      - name: Client presentation test (globe + .seadsrec + playback)
        shell: bash
        run: "${{ steps.bin.outputs.cltest }}"

      # Layer 7. seads_netserver/netclient/netloop are default targets, so the build step above
      # already build-only-smokes the Winsock/BSD #ifdef on every leg. The framing byte-exact test
      # runs everywhere; the socket loopback determinism bridge needs a live 127.0.0.1 port, so it
      # runs only on the NATIVE x64 legs (the arm64 legs are emulated/foreign-run for hashing).
      - name: Stream-framing (layer 7) byte-exact test
        shell: bash
        run: "${{ steps.bin.outputs.ftest }}"

      - name: Socket loopback determinism bridge (layer 7)
        if: matrix.name == 'MSVC x64' || matrix.name == 'GCC x64' || matrix.name == 'Clang x64'
        shell: bash
        run: "${{ steps.bin.outputs.nloop }}"

      # Layer 8. seads_multiclient_test is a default target (build-only-smoked on every leg above);
      # the fan-out determinism bridge (N clients over N live sockets) needs live 127.0.0.1 ports, so
      # it runs only on the NATIVE x64 legs, exactly like the layer-7 bridge.
      - name: Multi-client fan-out determinism bridge (layer 8)
        if: matrix.name == 'MSVC x64' || matrix.name == 'GCC x64' || matrix.name == 'Clang x64'
        shell: bash
        run: "${{ steps.bin.outputs.nmulti }}"

      # Layer 9. seads_netdyn_test is a default target (build-only-smoked on every leg above); the
      # single-thread select() broadcast with dynamic join/leave needs live 127.0.0.1 ports, so the
      # full/late/leaver bridge runs only on the NATIVE x64 legs, like the layer-7/8 bridges.
      - name: Dynamic-membership broadcast determinism bridge (layer 9)
        if: matrix.name == 'MSVC x64' || matrix.name == 'GCC x64' || matrix.name == 'Clang x64'
        shell: bash
        run: "${{ steps.bin.outputs.ndyn }}"

      # Layer 10. seads_netcatchup_test is a default target (build-only-smoked on every leg above);
      # the late-join catch-up bridge (a mid-stream joiner is replayed the missed prefix and
      # reconstructs the SAME sealed digest as a from-frame-0 client) needs live 127.0.0.1 ports, so
      # it runs only on the NATIVE x64 legs, exactly like the layer-7/8/9 bridges.
      - name: Late-join catch-up determinism bridge (layer 10)
        if: matrix.name == 'MSVC x64' || matrix.name == 'GCC x64' || matrix.name == 'Clang x64'
        shell: bash
        run: "${{ steps.bin.outputs.ncatch }}"

      # Layer 11. seads_netasync_test is a default target (build-only-smoked on every leg above);
      # the async-output bridge (a never-reading client cannot back-pressure the broadcast through
      # pinned tiny kernel buffers, and the buffered path — catch-up included — reconstructs the
      # sealed session digest) needs live 127.0.0.1 ports, so it runs only on the NATIVE x64 legs,
      # exactly like the layer-7/8/9/10 bridges.
      - name: Async-output determinism bridge (layer 11)
        if: matrix.name == 'MSVC x64' || matrix.name == 'GCC x64' || matrix.name == 'Clang x64'
        shell: bash
        run: "${{ steps.bin.outputs.nasync }}"

      - name: Run all goldens + hash + validate
        shell: bash
        run: |
          set -e
          mkdir -p hashes
          run_one() {  # $1 = golden id, $2.. = command to produce run.bin
            local ID="$1"; shift
            "$@" --out run.bin
            python - "$ID" <<'PY'
          import sys, hashlib
          ID = sys.argv[1]
          h = hashlib.sha256(open("run.bin","rb").read()).hexdigest()
          open("hashes/%s.txt" % ID, "w").write(h + "\n")
          print(ID, h)
          PY
            python tools/validate_snapshot.py \
              --golden "tests/golden/$ID/expected.world_hash" --candidate run.bin
          }
          run_one GOLDEN-SK-Sphere-001    "${{ steps.bin.outputs.golden }}"
          run_one GOLDEN-SK-Turn-001      "${{ steps.bin.outputs.scenario }}" --id GOLDEN-SK-Turn-001
          run_one GOLDEN-SK-Climb-001     "${{ steps.bin.outputs.scenario }}" --id GOLDEN-SK-Climb-001
          run_one GOLDEN-SK-TurnClimb-001 "${{ steps.bin.outputs.scenario }}" --id GOLDEN-SK-TurnClimb-001
          run_one GOLDEN-SK-Accel-001     "${{ steps.bin.outputs.scenario }}" --id GOLDEN-SK-Accel-001
          run_one GOLDEN-SK-Pitch-001     "${{ steps.bin.outputs.scenario }}" --id GOLDEN-SK-Pitch-001
          run_one GOLDEN-SK-Stall-001     "${{ steps.bin.outputs.scenario }}" --id GOLDEN-SK-Stall-001
          run_one GOLDEN-SK-Gunfire-001   "${{ steps.bin.outputs.scenario }}" --id GOLDEN-SK-Gunfire-001
          run_one GOLDEN-SK-Hit-001       "${{ steps.bin.outputs.scenario }}" --id GOLDEN-SK-Hit-001
          run_one GOLDEN-SK-Winchester-001 "${{ steps.bin.outputs.scenario }}" --id GOLDEN-SK-Winchester-001

      - name: Upload hash artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hash-${{ matrix.name }}
          path: hashes/

  verify-determinism:
    name: Cross-toolchain hash aggregation
    needs: [ python-gates, build-matrix ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: hashes }
      - name: All world_hashes identical and equal to each seal
        run: |
          set -e
          # Per golden: every toolchain's hash must equal that golden's seal.
          # Strip ALL whitespace (incl. CR) — seal files / Windows-written hashes can carry CRLF.
          fail=0
          for ID in GOLDEN-SK-Sphere-001 GOLDEN-SK-Turn-001 GOLDEN-SK-Climb-001 GOLDEN-SK-TurnClimb-001 GOLDEN-SK-Accel-001 GOLDEN-SK-Pitch-001 GOLDEN-SK-Stall-001 GOLDEN-SK-Gunfire-001 GOLDEN-SK-Hit-001 GOLDEN-SK-Winchester-001; do
            SEAL=$(tr -d '[:space:]' < "tests/golden/$ID/expected.world_hash")
            echo "=== $ID sealed: $SEAL ==="
            count=0
            for f in hashes/*/"$ID.txt"; do
              [ -e "$f" ] || continue
              H=$(tr -d '[:space:]' < "$f")
              echo "  $(dirname "$f"): $H"
              if [ "$H" != "$SEAL" ]; then echo "    MISMATCH"; fail=1; fi
              count=$((count + 1))
            done
            if [ "$count" -eq 0 ]; then echo "  NO HASHES FOUND for $ID"; fail=1; fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "DETERMINISM GATE FAILED"; exit 1
          fi
          echo "DETERMINISM GATE PASSED — all toolchains agree with every golden seal."
